{% load i18n %}
<script>
    document.addEventListener("alpine:init", () => {
        Alpine.data("mapController", () => ({
            map: null,
            selectedFeature: null,
            highlightedWorkAreaId: null,
            hoveringWorkArea: false,
            hintTimeout: null,
            showWorkAreaEditModal: false,
            showReviewInaccessibilityModal: false,
            showVisits: false,
            filterQuery: '',

            // Assignment mode state
            assignmentMode: {{ assignment_mode|yesno:'true,false' }},
            selectedWorkAreas: new Set(),
            groupWorkAreaIds: new Set(),
            flwFilterWorkAreaIds: new Set(),
            selectedGroupId: null,
            selectedFlwFilterId: null,
            selectedAssigneeId: null,
            flwSummaryAssigneeId: null,
            flwSummary: null,
            flwSummaryLoading: false,
            showConfirmModal: false,
            showDiscardModal: false,
            showExcludeModal: false,
            showUnassignModal: false,
            isSaving: false,
            isUnassigning: false,
            showOnlyUnassigned: false,
            assignees: [],
            workAreaProperties: new Map(),
            assignmentQueue: [],
            excludedWorkAreaIds: new Set(),

            cannotExclude(id) {
                if (this.excludedWorkAreaIds.has(id)) return true;
                const status = this.workAreaProperties.get(id)?.status;
                return status !== undefined && status !== 'NOT_VISITED' && status !== 'UNASSIGNED';
            },

            cannotUnassign(id) {
                const status = this.workAreaProperties.get(id)?.status;
                return status !== undefined && status !== 'NOT_VISITED';
            },

            setWorkAreaState(id, state) {
                this.map.setFeatureState({ source: 'workareas', sourceLayer: 'workareas', id }, state);
            },

            openWorkAreaEditModal(workAreaId) {
                const editWorkAreaUrl = '{{ edit_work_area_url|escapejs }}';
                const url = editWorkAreaUrl + workAreaId + '/';
                htmx.ajax('GET', url, { target: '#work-area-form', swap: 'innerHTML' })
                .then(() => this.showWorkAreaEditModal = true)
            },

            showVisitPopup(feature, lngLat) {
                const userVisitDataUrl = '{{ user_visit_data_url|escapejs }}';
                const url = userVisitDataUrl + feature.properties.visit_uuid + '/';
                fetch(url)
                    .then((res) => {
                        if (!res.ok) throw new Error('Failed to load visit data');
                        return res.json();
                    })
                    .then((data) => {
                        new mapboxgl.Popup()
                            .setLngLat(lngLat)
                            .setHTML(`
                                <table><tbody>
                                <tr><th class="text-left pr-4 whitespace-nowrap">{% translate "Connect Worker" %}</th><td>${data.worker_name}</td></tr>
                                <tr><th class="text-left pr-4 whitespace-nowrap">{% translate "Visit Date" %}</th><td>${data.visit_date}</td></tr>
                                <tr><th class="text-left pr-4 whitespace-nowrap">{% translate "Deliver Type" %}</th><td>${data.deliver_type ?? '—'}</td></tr>
                                </tbody></table>
                                <a href="${data.worker_url}" class="button button-sm button-outline-rounded mt-2">{% translate "View Visit" %}</a>
                            `)
                            .addTo(this.map);
                    })
                    .catch(() => {
                        new mapboxgl.Popup()
                            .setLngLat(lngLat)
                            .setHTML(`<p>{% translate "Visit details unavailable." %}</p>`)
                            .addTo(this.map);
                    });
            },

            updateHighlightedWorkAreaId() {
                this.highlightedWorkAreaId = (this.assignmentMode || !this.selectedFeature)
                    ? null
                    : this.selectedFeature._id;
            },

            visitCircleOpacity() {
                return this.highlightedWorkAreaId !== null ? 0.2 : 0.7;
            },

            buildVisitCirclePaint() {
                return {
                    'circle-radius': [
                        'interpolate', ['linear'], ['zoom'],
                        8, 2,
                        14, 5,
                    ],
                    'circle-color': '#e74c3c',
                    'circle-opacity': this.visitCircleOpacity(),
                    'circle-stroke-width': 1,
                    'circle-stroke-color': '#ffffff',
                    'circle-stroke-opacity': 0.5,
                };
            },

            addVisitHighlightLayer() {
                if (!this.map || this.map.getLayer('user-visits-highlight')) return;
                this.map.addLayer({
                    id: 'user-visits-highlight',
                    type: 'symbol',
                    source: 'user-visits',
                    'source-layer': 'user-visits',
                    layout: {
                        'text-field': '◆',
                        'text-size': [
                            'interpolate', ['linear'], ['zoom'],
                            8, 13,
                            14, 22,
                        ],
                        'text-font': ['DIN Pro Medium', 'Arial Unicode MS Regular'],
                        'text-allow-overlap': true,
                        'text-ignore-placement': true,
                        'visibility': 'none',
                    },
                    paint: {
                        'text-color': '#22c55e',
                        'text-halo-color': '#000000',
                        'text-halo-width': 2.5,
                    },
                });
            },

            refreshVisitStyling() {
                if (!this.map) return;

                if (this.map.getLayer('user-visits-circle')) {
                    this.map.setPaintProperty(
                        'user-visits-circle',
                        'circle-opacity',
                        this.visitCircleOpacity(),
                    );
                }

                if (this.map.getLayer('user-visits-highlight')) {
                    const id = this.highlightedWorkAreaId;
                    if (id === null) {
                        this.map.setLayoutProperty('user-visits-highlight', 'visibility', 'none');
                    } else {
                        this.map.setFilter(
                            'user-visits-highlight',
                            ['==', ['get', 'work_area_id'], id],
                        );
                        this.map.setLayoutProperty(
                            'user-visits-highlight',
                            'visibility',
                            this.showVisits ? 'visible' : 'none',
                        );
                    }
                }
            },

            openReviewInaccessibilityModal(workAreaId) {
                const reviewUrl = '{{ review_inaccessibility_url|escapejs }}';
                const url = reviewUrl + workAreaId + '/';
                const fragment = document.getElementById('review-inaccessibility-fragment');
                // Clear any previously loaded content so an errored fetch (htmx does not swap
                // non-2xx responses) can't leave a stale or blank modal behind.
                fragment.innerHTML = '';
                htmx.ajax('GET', url, { target: '#review-inaccessibility-fragment', swap: 'innerHTML' })
                    .then(() => {
                        if (!fragment.innerHTML.trim()) {
                            this.showToast(
                                "{% translate 'This request is no longer available. Refresh the map and try again.' %}",
                                true,
                            );
                            return;
                        }
                        this.showReviewInaccessibilityModal = true;
                        setTimeout(() => window.reviewInaccessibilityMap?.resize(), 0);
                    });
            },

            getDownloadUrl() {
                const baseUrl = '{{ download_url|escapejs }}';
                return this.filterQuery ? `${baseUrl}?${this.filterQuery}` : baseUrl;
            },

            showToast(message, isError = false, duration = 3000) {
                const toast = document.getElementById('toast-container');
                if (!toast) return;
                document.getElementById('toast-message').innerText = message;
                document.getElementById('toast-icon').className = `fa-solid ${isError ? 'fa-circle-xmark' : 'fa-circle-check'} text-lg`;
                toast.classList.remove('bg-green-600', 'bg-red-600', 'opacity-0');
                toast.classList.add(isError ? 'bg-red-600' : 'bg-green-600', 'opacity-100');
                setTimeout(() => {
                    toast.classList.remove('opacity-100');
                    toast.classList.add('opacity-0');
                }, duration);
            },

            applyFilters() {
                if (!this.map) return;
                const form = this.$refs.filterForm;
                const query = new URLSearchParams(new FormData(form)).toString();
                this.filterQuery = query;
                const baseUrl = `${window.location.origin}{{ tiles_url|escapejs }}`;
                const newUrl = query ? `${baseUrl}?${query}` : baseUrl;
                const source = this.map.getSource('workareas');
                if (source) {
                    source.setTiles([newUrl]);
                    this.selectedFeature = null; // Clear selection on filter change
                }
                const visitSource = this.map.getSource('user-visits');
                if (visitSource) {
                    const visitBaseUrl = `${window.location.origin}{{ visit_tiles_url|escapejs }}`;
                    const visitNewUrl = query ? `${visitBaseUrl}?${query}` : visitBaseUrl;
                    visitSource.setTiles([visitNewUrl]);
                }
                this.showToast("{% translate 'Filters updated!' %}", false, 500);
            },

            clearFilters() {
                const form = this.$refs.filterForm;
                form.reset();
                // Clear TomSelect instances
                form.querySelectorAll('select[data-tomselect]').forEach(el => {
                    if (el.tomselect) el.tomselect.clear();
                });
                this.applyFilters();
            },

            // --- Assignment mode methods ---

            toggleWorkAreaSelection(id, properties) {
                const isDeselecting = this.selectedWorkAreas.has(id);
                if (isDeselecting) {
                    this.selectedWorkAreas.delete(id);
                    this.flwFilterWorkAreaIds.delete(id);
                } else {
                    this.selectedWorkAreas.add(id);
                    if (properties) {
                        this.workAreaProperties.set(id, properties);
                    }
                }

                // Clear group dropdown if the map click breaks the group selection:
                // either deselecting a WA inside the group, or selecting one outside it
                if (this.selectedGroupId) {
                    const isGroupWa = this.groupWorkAreaIds.has(id);
                    if ((isDeselecting && isGroupWa) || (!isDeselecting && !isGroupWa)) {
                        this.groupWorkAreaIds.clear();
                        this.selectedGroupId = null;
                        if (this.$refs.groupSelect) this.$refs.groupSelect.value = '';
                    }
                }

                this.setWorkAreaState(id, { assignment_selected: this.selectedWorkAreas.has(id) });
                this.updateFlwSummary();
            },

            // Selects/deselects an entire Work Area Group with one click.
            async toggleGroupSelection(groupId, fallbackId, fallbackProperties) {
                if (groupId == null) {
                    this.toggleWorkAreaSelection(fallbackId, fallbackProperties);
                    return;
                }

                let workAreas;
                try {
                    const url = '{{ group_work_areas_url|escapejs }}'.replace('__group_id__', groupId);
                    const resp = await fetch(url);
                    const data = await resp.json();
                    workAreas = data.work_areas;
                } catch (e) {
                    this.showToast("{% translate 'Failed to load group work areas' %}", true);
                    return;
                }

                // Any member already selected (even after a shift+click removed one) counts
                // as "this group is selected" - a plain click anywhere in it deselects the
                // whole group rather than just filling in the missing member.
                const hasAnySelected = workAreas.some(wa => this.selectedWorkAreas.has(wa.id));

                for (const wa of workAreas) {
                    this.workAreaProperties.set(wa.id, wa);
                    if (hasAnySelected) {
                        this.selectedWorkAreas.delete(wa.id);
                    } else {
                        this.selectedWorkAreas.add(wa.id);
                    }
                    this.setWorkAreaState(wa.id, { assignment_selected: !hasAnySelected });
                }
                this.updateFlwSummary();
            },

            selectGroup(groupId) {
                this.selectedGroupId = groupId || null;
                return this.replaceFilterSelection({
                    trackingSet: this.groupWorkAreaIds,
                    selectionId: groupId,
                    url: '{{ group_work_areas_url|escapejs }}'.replace('__group_id__', groupId),
                    errorMsg: "{% translate 'Failed to load group work areas' %}",
                });
            },

            selectByAssignee(assigneeId) {
                this.selectedFlwFilterId = assigneeId || null;
                return this.replaceFilterSelection({
                    trackingSet: this.flwFilterWorkAreaIds,
                    selectionId: assigneeId,
                    url: '{{ flw_work_areas_url|escapejs }}'.replace('__assignee_id__', assigneeId),
                    errorMsg: "{% translate 'Failed to load FLW work areas' %}",
                });
            },

            // Replaces the selection contributed by one filter (a group or an FLW).
            async replaceFilterSelection({ trackingSet, selectionId, url, errorMsg }) {
                for (const id of trackingSet) {
                    this.selectedWorkAreas.delete(id);
                    this.setWorkAreaState(id, { assignment_selected: false });
                }
                trackingSet.clear();

                if (!selectionId) {
                    this.updateFlwSummary();
                    return;
                }

                // Show the summary spinner while this filter's areas load. Until they
                // land, flwFilterWorkAreaIds is empty, so the live delta would transiently
                // count the FLW's own existing areas as "new" and inflate the total.
                this.flwSummaryLoading = true;
                try {
                    const resp = await fetch(url);
                    const data = await resp.json();
                    for (const wa of data.work_areas) {
                        this.selectedWorkAreas.add(wa.id);
                        trackingSet.add(wa.id);
                        this.workAreaProperties.set(wa.id, wa);
                        this.setWorkAreaState(wa.id, { assignment_selected: true });
                    }
                } catch (e) {
                    this.showToast(errorMsg, true);
                }
                this.updateFlwSummary();
            },

            clearSelection() {
                for (const id of this.selectedWorkAreas) {
                    this.setWorkAreaState(id, { assignment_selected: false });
                }
                this.selectedWorkAreas.clear();
                this.groupWorkAreaIds.clear();
                this.flwFilterWorkAreaIds.clear();
                if (this.$refs.groupSelect) this.$refs.groupSelect.value = '';
                this.selectedGroupId = null;
                this.selectedFlwFilterId = null;
                this.updateFlwSummary();
            },

            async updateFlwSummary() {
                if (!this.flwSummaryAssigneeId) {
                    this.flwSummary = null;
                    this.flwSummaryLoading = false;
                    return;
                }
                this.flwSummaryLoading = true;
                try {
                    const url = `{{ flw_summary_url|escapejs }}?assignee_id=${this.flwSummaryAssigneeId}`;
                    const resp = await fetch(url);
                    this.flwSummary = await resp.json();
                } catch (e) {
                    this.showToast("{% translate 'Failed to load FLW summary' %}", true);
                }
                this.flwSummaryLoading = false;
            },

            getStatsForIds(workAreaIds) {
                let buildings = 0;
                let visits = 0;
                for (const id of workAreaIds) {
                    const props = this.workAreaProperties.get(id);
                    if (props) {
                        buildings += parseInt(props.building_count) || 0;
                        visits += parseInt(props.expected_visit_count) || 0;
                    }
                }
                return { buildings, visits };
            },

            getSelectedStats() {
                return this.getStatsForIds(this.selectedWorkAreas);
            },

            getSelectedStatsForSummary() {
                // Live preview of pending changes for the FLW summary. Count only the
                // net-new areas this selection would add, i.e. exclude:
                //   - the FLW's existing DB areas (flwFilterWorkAreaIds), which
                //     selectByAssignee() auto-selects and are already in flwSummary; and
                //   - areas already queued for this FLW, which getQueuedStatsForAssignee()
                //     already counts — re-selecting one would otherwise double-count it.
                const alreadyQueued = this.getQueuedWorkAreaIdsForAssignee(this.selectedAssigneeId);
                const pendingIds = Array.from(this.selectedWorkAreas).filter(
                    id => !this.flwFilterWorkAreaIds.has(id) && !alreadyQueued.has(id)
                );
                return { ...this.getStatsForIds(pendingIds), workAreas: pendingIds.length };
            },

            getQueuedWorkAreaIdsForAssignee(assigneeId) {
                return new Set(
                    this.assignmentQueue
                        .filter(entry => String(entry.assignee_id) === String(assigneeId))
                        .flatMap(entry => entry.work_area_ids)
                );
            },

            getQueuedStatsForAssignee() {
                let buildings = 0;
                let visits = 0;
                let workAreas = 0;
                for (const entry of this.assignmentQueue) {
                    if (String(entry.assignee_id) === String(this.flwSummaryAssigneeId)) {
                        buildings += entry.buildings;
                        visits += entry.visits;
                        workAreas += entry.work_area_ids.length;
                    }
                }
                return { buildings, visits, workAreas };
            },

            getFlwSummaryPendingDelta(kind) {
                // Net-new count (kind: 'buildings' | 'visits' | 'workAreas') for the FLW
                // shown in the summary: areas queued for them plus, if they're the
                // active assignee, the live selection's net-new areas.
                const queued = this.getQueuedStatsForAssignee()[kind];
                const selected = String(this.flwSummaryAssigneeId) === String(this.selectedAssigneeId)
                    ? this.getSelectedStatsForSummary()[kind]
                    : 0;
                return queued + selected;
            },

            formatFlwSummaryTotal(base, kind) {
                const delta = this.getFlwSummaryPendingDelta(kind);
                return delta > 0 ? `${base} + ${delta} (new)` : `${base}`;
            },

            findAssignee(assigneeId) {
                return this.assignees.find(assignee => String(assignee.id) === String(assigneeId));
            },

            getAssigneeName() {
                return this.findAssignee(this.selectedAssigneeId)?.user__name ?? '';
            },

            getAssigneeUserId() {
                return this.findAssignee(this.selectedAssigneeId)?.user__user_id ?? '';
            },

            getFlwSummaryUserId() {
                return this.findAssignee(this.flwSummaryAssigneeId)?.user__user_id ?? '';
            },

            addToQueue() {
                if (this.selectedWorkAreas.size === 0 || !this.selectedAssigneeId) return;
                const newWorkAreaIds = Array.from(this.selectedWorkAreas).filter(
                    id => !this.flwFilterWorkAreaIds.has(id)
                );
                const existing = this.assignmentQueue.find(
                    e => String(e.assignee_id) === String(this.selectedAssigneeId)
                );
                if (existing) {
                    // Consolidate into the FLW's existing entry, counting only areas not
                    // already queued for them so re-selecting an area can't double-count.
                    const alreadyQueued = new Set(existing.work_area_ids);
                    const addedIds = newWorkAreaIds.filter(id => !alreadyQueued.has(id));
                    const added = this.getStatsForIds(addedIds);
                    existing.work_area_ids.push(...addedIds);
                    existing.buildings += added.buildings;
                    existing.visits += added.visits;
                    existing.total_work_areas += addedIds.length;
                    existing.total_buildings += added.buildings;
                    existing.total_visits += added.visits;
                } else {
                    const newStats = this.getSelectedStatsForSummary();
                    const totalStats = this.getSelectedStats();
                    this.assignmentQueue.push({
                        assignee_id: this.selectedAssigneeId,
                        assignee_name: this.getAssigneeName(),
                        // Delta (newly-selected areas only)
                        work_area_ids: newWorkAreaIds,
                        buildings: newStats.buildings,
                        visits: newStats.visits,
                        // Post-save totals (all selected areas, incl. the FLW's existing
                        // areas auto-selected via the filter)
                        total_work_areas: this.selectedWorkAreas.size,
                        total_buildings: totalStats.buildings,
                        total_visits: totalStats.visits,
                    });
                }
                this.clearSelection();
                if (this.$refs.assigneeSelect) this.$refs.assigneeSelect.value = '';
                this.selectedAssigneeId = null;
                this.flwSummary = null;
            },

            removeFromQueue(index) {
                this.assignmentQueue.splice(index, 1);
            },

            handleSaveAndConfirm() {
                if (this.selectedWorkAreas.size > 0 && this.selectedAssigneeId) {
                    this.addToQueue();
                }
                if (this.assignmentQueue.length > 0) {
                    this.showConfirmModal = true;
                }
            },

            async saveAssignment() {
                this.isSaving = true;
                try {
                    const resp = await fetch('{{ assignment_save_url|escapejs }}', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': '{{ csrf_token }}',
                        },
                        body: JSON.stringify({ assignments: this.assignmentQueue }),
                    });
                    this.showConfirmModal = false;
                    if (resp.ok) {
                        this.showToast("{% translate 'Assignment saved successfully!' %}");
                        this.assignmentQueue = [];
                        this.clearSelection();
                        if (this.$refs.assigneeSelect) this.$refs.assigneeSelect.value = '';
                        this.selectedAssigneeId = null;
                        this.flwSummary = null;
                    } else {
                        const data = await resp.json().catch(() => ({}));
                        this.showToast(data.error || "{% translate 'Failed to save assignment' %}", true);
                    }
                } catch (e) {
                    this.showConfirmModal = false;
                    this.showToast("{% translate 'Failed to save assignment' %}", true);
                } finally {
                    this.isSaving = false;
                }
            },

            async unassignWorkAreas() {
                const eligibleIds = Array.from(this.selectedWorkAreas).filter(id => !this.cannotUnassign(id));
                if (eligibleIds.length === 0) {
                    this.showUnassignModal = false;
                    this.showToast("{% translate 'No eligible work areas to unassign.' %}");
                    return;
                }
                this.isUnassigning = true;
                try {
                    const resp = await fetch('{{ assignment_unassign_url|escapejs }}', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': '{{ csrf_token }}',
                        },
                        body: JSON.stringify({ work_area_ids: eligibleIds }),
                    });
                    if (resp.ok) {
                        const data = await resp.json();
                        // Only repaint work areas the server actually unassigned. On a partial HQ
                        // failure the failed IDs stay assigned in DB and must keep their existing status.
                        const unassignedIds = data.unassigned_ids || [];
                        const failedIds = data.failed_ids || [];
                        for (const id of unassignedIds) {
                            this.setWorkAreaState(id, { status: 'UNASSIGNED' });
                            const props = this.workAreaProperties.get(id);
                            if (props) {
                                props.status = 'UNASSIGNED';
                                props.assignee_name = null;
                            }
                        }
                        this.showUnassignModal = false;
                        // Clear the selection, then re-select any failed areas so they stay highlighted
                        // on the map for the user to inspect and retry.
                        this.clearSelection();
                        for (const id of failedIds) {
                            this.selectedWorkAreas.add(id);
                            this.setWorkAreaState(id, { assignment_selected: true });
                        }
                        const msg = data.skipped || failedIds.length
                            ? "{% translate 'Unassigned' %} " + unassignedIds.length + " " + "{% translate 'work area(s).' %}"
                              + (data.skipped ? " " + data.skipped + " " + "{% translate 'skipped.' %}" : "")
                              + (failedIds.length ? " " + failedIds.length + " " + "{% translate 'failed to sync and remain selected for retry.' %}" : "")
                            : "{% translate 'Work area(s) unassigned successfully.' %}";
                        this.showToast(msg, failedIds.length > 0);
                        if (this.flwSummaryAssigneeId) this.updateFlwSummary();
                    } else {
                        const data = await resp.json().catch(() => ({}));
                        this.showToast(data.error || "{% translate 'Failed to unassign work areas' %}", true);
                    }
                } catch (e) {
                    this.showToast("{% translate 'Failed to unassign work areas' %}", true);
                } finally {
                    this.isUnassigning = false;
                }
            },

            handleCancel() {
                if (this.assignmentQueue.length > 0 || this.selectedWorkAreas.size > 0 || this.selectedAssigneeId) {
                    this.showDiscardModal = true;
                } else {
                    window.location.href = window.location.pathname;
                }
            },

            applyUnassignedFilter() {
                if (!this.map) return;
                const baseUrl = `${window.location.origin}{{ tiles_url|escapejs }}`;
                const newUrl = this.showOnlyUnassigned ? `${baseUrl}?unassigned_only=true` : baseUrl;
                const source = this.map.getSource('workareas');
                if (source) {
                    source.setTiles([newUrl]);
                }
            },

            init() {
                this.$nextTick(() => {
                    this.initializeMap();
                });

                this.$watch('selectedFeature', () => this.updateHighlightedWorkAreaId());
                this.$watch('highlightedWorkAreaId', () => this.refreshVisitStyling());

                if (this.assignmentMode) {
                    const assigneesEl = document.getElementById('assignees-data');
                    if (assigneesEl) this.assignees = JSON.parse(assigneesEl.textContent);

                    this.$watch('showOnlyUnassigned', () => {
                        this.applyUnassignedFilter();
                    });
                }

                document.addEventListener('workAreaUpdated', (e) => {
                    const data = e.detail;

                    // Update sidebar if selected
                    if (this.selectedFeature && this.selectedFeature._id === data.id) {
                        this.selectedFeature = {
                            ...this.selectedFeature,
                            expected_visit_count: data.expected_visit_count,
                            group_id: data.group_id,
                            group_name: data.group_name,
                            slug: data.slug,
                            visits_completed: data.visits_completed,
                        };
                    }

                    // Always update map feature state
                    this.setWorkAreaState(data.id, {
                        group_id: data.group_id,
                        expected_visit_count: data.expected_visit_count,
                    });

                    this.showWorkAreaEditModal = false;
                    this.showToast("{% translate 'Work area updated successfully!' %}");
                });

                document.addEventListener('inaccessibilityReviewed', (e) => {
                    const data = e.detail;
                    if (this.selectedFeature && this.selectedFeature._id === data.id) {
                        this.selectedFeature = { ...this.selectedFeature, status: data.status };
                    }
                    this.setWorkAreaState(data.id, { status: data.status });
                    this.showReviewInaccessibilityModal = false;
                    this.showToast("{% translate 'Work area review saved.' %}");
                });

                document.addEventListener('work_areas_excluded', (e) => {
                    const excluded = e.detail?.excluded ?? [];
                    const skipped = e.detail?.skipped ?? 0;
                    for (const id of excluded) {
                        this.setWorkAreaState(id, { status: 'EXCLUDED' });
                        this.excludedWorkAreaIds.add(id);
                    }
                    this.showExcludeModal = false;
                    this.clearSelection();
                    if (excluded.length > 0 && skipped === 0) {
                        this.showToast(`{% translate "Work area(s) excluded successfully." %}`);
                    } else if (excluded.length > 0 && skipped > 0) {
                        this.showToast(`${excluded.length} {% translate "excluded" %}, ${skipped} {% translate "skipped (already excluded or not eligible)." %}`);
                    } else if (skipped > 0) {
                        this.showToast(`{% translate "No work areas were excluded. Only 'Not Visited' or 'Unassigned' work areas can be excluded." %}`, true);
                    }
                });
            },


            async initializeMap() {
                const accessToken = '{{ mapbox_api_key|escapejs }}';
                const tilesUrl = `${window.location.origin}{{ tiles_url|escapejs }}`;
                const groupsUrl = '{{ groups_url|escapejs }}';
                const minZoom = parseInt("{{ workarea_min_zoom|escapejs }}");

                if (!MapboxUtils.setAccessToken(accessToken)) return;

                this.map = MapboxUtils.createMap({
                    container: 'map',
                    style: 'mapbox://styles/mapbox/standard',
                    projection: 'globe',
                    zoom: 5,
                    center: [8.675, 9.082]
                });

                // navigation ui on left of the map
                MapboxUtils.addNavigation(this.map, 'top-left');

                // Mapbox binds shift+drag to box-zoom by default, which intercepts the
                // mousedown/click sequence before our shift+click work-area handler sees it.
                this.map.boxZoom.disable();

                await new Promise(resolve => this.map.once('load', resolve));

                // Workareas are served using django-vectortiles,
                // promoteId maps the feature's 'id' property as the feature ID,
                // which is required for setFeatureState (hover/select) to work correctly.
                this.map.addSource('workareas', {
                    type: 'vector',
                    tiles: [tilesUrl],
                    minzoom: minZoom,
                    promoteId: { 'workareas': 'id' }
                });

                // Colors each workarea by group using a golden angle HSL hash on group_id,
                // so adjacent groups get visually distinct colors without a lookup table.
                // Opacity varies by status to give a quick visual overview of progress.
                this.map.addLayer({
                    id: 'workareas-fill',
                    type: 'fill',
                    source: 'workareas',
                    'source-layer': 'workareas',
                    paint: {
                        'fill-color': [
                            'case',
                            ['boolean', ['feature-state', 'hovered'], false],
                            '#ffffff',

                            // Excluded areas are always grey regardless of group — supports
                            // live update via setFeatureState without waiting for tile reload.
                            ['==', ['coalesce', ['feature-state', 'status'], ['get', 'status']], 'EXCLUDED'],
                            '#9ca3af',

                            [
                                'case',
                                [
                                    '==',
                                    [
                                        'coalesce',
                                        ['feature-state', 'group_id'],   // feature-state is the live state that can be updated with setFeatureState
                                        ['get', 'group_id'],           // get is the original value from the tile data
                                    ],
                                    null
                                ],
                                '#cccccc',  // gray for no group
                                [
                                    'hsl',
                                    [
                                        '%',
                                        [
                                            '*',
                                            [
                                                'to-number',
                                                [
                                                    'coalesce',
                                                    ['feature-state', 'group_id'],
                                                    ['get', 'group_id']
                                                ]
                                            ],
                                            137.508
                                        ],
                                        360  // visually distinct colors for sequential group IDs
                                    ],
                                    65,
                                    55
                                ]
                            ]
                        ],
                        'fill-opacity': [
                            'match',
                            [
                                'coalesce',
                                ['feature-state', 'status'],
                                ['get', 'status']
                            ],
                            'EXPECTED_VISIT_REACHED', 1.0,
                            'VISITED', 0.85,
                            'NOT_VISITED', 0.65,
                            'UNASSIGNED', 0.55,
                            'EXCLUDED', 0.45,
                            'INACCESSIBLE', 0.40,
                            'REQUEST_FOR_INACCESSIBLE', 0.35,
                            0.6
                        ]
                    }
                });

                // Thin white lines between workareas, only visible when zoomed in (z>=8)
                this.map.addLayer({
                    id: 'workareas-outline',
                    type: 'line',
                    source: 'workareas',
                    'source-layer': 'workareas',
                    minzoom: 8,
                    paint: {
                        'line-color': '#ffffff',
                        'line-width': 0.5,
                        'line-opacity': 0.4
                    }
                });

                // Yellow highlight shown on workareas the user has clicked to select.
                this.map.addLayer({
                    id: 'workareas-selected',
                    type: 'line',
                    source: 'workareas',
                    'source-layer': 'workareas',
                    minzoom: 8,
                    paint: {
                        'line-color': '#00ffff',
                        'line-width': 3,
                        'line-opacity': [
                            'case',
                            ['boolean', ['feature-state', 'selected'], false],
                            1,
                            0
                        ]
                    }
                });

                // Black highlight for assignment mode multi-select
                if (this.assignmentMode) {
                    this.map.addLayer({
                        id: 'workareas-assignment-selected',
                        type: 'line',
                        source: 'workareas',
                        'source-layer': 'workareas',
                        minzoom: 8,
                        paint: {
                            'line-color': '#000000',
                            'line-width': 3,
                            'line-opacity': [
                                'case',
                                ['boolean', ['feature-state', 'assignment_selected'], false],
                                1,
                                0
                            ]
                        }
                    });

                    // Reapply assignment_selected state when tiles reload (pan/zoom)
                    this.map.on('sourcedata', (e) => {
                        if (e.sourceId === 'workareas' && e.isSourceLoaded) {
                            for (const id of this.selectedWorkAreas) {
                                this.setWorkAreaState(id, { assignment_selected: true });
                            }
                        }
                    });
                }

                // Source and layer are added lazily on first toggle to avoid
                // fetching tiles while the layer is hidden.
                const visitBaseUrl = `${window.location.origin}{{ visit_tiles_url|escapejs }}`;
                let visitsLayerAdded = false;

                this.$watch('showVisits', (visible) => {
                    if (visible && !visitsLayerAdded) {
                        const form = this.$refs.filterForm;
                        const query = new URLSearchParams(new FormData(form)).toString();
                        const visitTilesUrl = query ? `${visitBaseUrl}?${query}` : visitBaseUrl;
                        this.map.addSource('user-visits', {
                            type: 'vector',
                            tiles: [visitTilesUrl],
                            minzoom: minZoom,
                        });
                        this.map.addLayer({
                            id: 'user-visits-circle',
                            type: 'circle',
                            source: 'user-visits',
                            'source-layer': 'user-visits',
                            paint: this.buildVisitCirclePaint(),
                        });
                        this.addVisitHighlightLayer();
                        visitsLayerAdded = true;
                        this.refreshVisitStyling();

                        ['user-visits-circle', 'user-visits-highlight'].forEach((layerId) => {
                            this.map.on('click', layerId, (e) => {
                                const feature = e.features?.[0];
                                if (!feature) return;
                                this.showVisitPopup(feature, e.lngLat);
                            });
                            this.map.on('mouseenter', layerId, () => {
                                this.map.getCanvasContainer().style.cursor = 'pointer';
                            });
                            this.map.on('mouseleave', layerId, () => {
                                this.map.getCanvasContainer().style.cursor = '';
                            });
                        });
                    } else if (visitsLayerAdded) {
                        this.map.setLayoutProperty('user-visits-circle', 'visibility', visible ? 'visible' : 'none');
                        if (this.map.getLayer('user-visits-highlight')) {
                            if (!visible) {
                                this.map.setLayoutProperty('user-visits-highlight', 'visibility', 'none');
                            } else {
                                this.refreshVisitStyling();
                            }
                        }
                    }
                });

                // Bold outlines showing the union boundary of each work area group.
                this.map.addSource('workarea-groups', {
                    type: 'geojson',
                    data: {
                        type: "FeatureCollection",
                        features: []
                    }
                });

                this.map.addLayer({
                    id: 'workarea-groups-outline',
                    type: 'line',
                    source: 'workarea-groups',
                    minzoom: 4,
                    paint: {
                        'line-color': '#000000',
                        'line-width': 3,
                        'line-opacity': 0.2
                    }
                });


                fetch(groupsUrl)
                    .then(res => {
                        if (!res.ok) throw new Error("Failed to fetch group boundaries");
                        return res.json();
                    })
                    .then(data => {

                        // Render group outlines if they exist
                        if (data.group_features?.length) {
                            this.map.getSource('workarea-groups').setData({
                                type: "FeatureCollection",
                                features: data.group_features
                            });
                        }

                        // Zoom using precomputed bounds
                        if (data.workarea_bounds) {
                            this.map.fitBounds(data.workarea_bounds, {
                                padding: 40,
                                duration: 0
                            });
                        }

                    })
                    .catch(err => console.error(err));


                // When the user clicks on the map, Mapbox returns the geographic object
                // under the cursor as a "feature". A feature represents a single polygon
                // (in our case a workarea) along with its attributes in `properties`.
                // `feature` → the raw Mapbox object returned from the click event.
                // `selectedFeature` → our Alpine state that stores the currently selected workarea.
                // We store its properties and ID so we can toggle the highlight and access its data.
                this.map.on('click', 'workareas-fill', (e) => {
                    const feature = e.features?.[0];
                    if (!feature || feature.id == null) return;
                    const id = feature.id;

                    // In assignment mode: plain click selects/deselects the whole Work Area
                    // Group by default; shift+click targets just this one work area.
                    if (this.assignmentMode) {
                        if (e.originalEvent.shiftKey) {
                            this.toggleWorkAreaSelection(id, feature.properties);
                        } else {
                            this.toggleGroupSelection(feature.properties.group_id, id, feature.properties);
                        }
                        return;
                    }

                    if (this.selectedFeature) {
                        this.setWorkAreaState(this.selectedFeature._id, { selected: false });
                    }
                    if (this.selectedFeature && this.selectedFeature._id === id) {
                        this.selectedFeature = null;
                        return;
                    }

                    // Merge tile properties with feature-state so sidebar reflects
                    // any local edits applied via setFeatureState.
                    const state = this.map.getFeatureState({
                        source: 'workareas',
                        sourceLayer: 'workareas',
                        id
                    });

                    this.selectedFeature = {
                        ...e.features[0].properties,
                        ...state,
                        _id: id
                    };

                    this.setWorkAreaState(id, { selected: true });
                });

                // Tracks the currently hovered feature to apply white fill highlight
                let hoveredId = null;
                this.map.on('mousemove', 'workareas-fill', (e) => {
                    this.map.getCanvasContainer().style.cursor = 'pointer';
                    this.hoveringWorkArea = true;
                    const feature = e.features?.[0];
                    if (!feature || feature.id == null) return;
                    const newId = feature.id;
                    if (newId === hoveredId) return;
                    if (hoveredId !== null) {
                        this.setWorkAreaState(hoveredId, { hovered: false });
                    }
                    hoveredId = newId;
                    this.setWorkAreaState(hoveredId, { hovered: true });
                });

                this.map.on('mouseleave', 'workareas-fill', () => {
                    this.map.getCanvasContainer().style.cursor = '';
                    this.hoveringWorkArea = false;
                    if (hoveredId !== null) {
                        this.setWorkAreaState(hoveredId, { hovered: false });
                        hoveredId = null;
                    }
                });
            }
        }));
    });
</script>
